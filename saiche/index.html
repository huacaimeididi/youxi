<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D NEON RUSH - 最终完美版</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #020205;
            font-family: 'Segoe UI', sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        #ui-layer {
            position: absolute; top: 20px; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10;
        }
        h1 { margin: 0; font-size: 26px; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; text-transform: uppercase; letter-spacing: 3px;}
        #score-board { font-size: 18px; margin: 5px 0; color: #fff; font-weight: bold; }
        .tip-text { font-size: 14px; color: #f1c40f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        #progress-box {
            position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
            width: 22px; height: 380px; background: rgba(255,255,255,0.05); border: 2px solid #444; border-radius: 11px; z-index: 10;
        }
        .dot { position: absolute; left: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; transition: bottom 0.05s linear; }
        #p-dot { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; z-index: 5; }
        #ai1-dot { background: #ff0055; }
        #ai2-dot { background: #ffca28; }
        
        #canvas-container {
            width: 720px; height: 480px; border: 3px solid #00ffcc; box-shadow: 0 0 40px rgba(0,255,204,0.4); position: relative; background: #000;
        }
        .back-btn { position: absolute; bottom: 20px; color: #444; text-decoration: none; font-size: 13px; z-index: 10; }
        .back-btn:hover { color: #fff; }
        #loading-text { position: absolute; top: 45%; width: 100%; text-align: center; font-size: 16px; color: #00ffcc; font-weight: bold; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>🏎️ 3D NEON RUSH: FINAL EDITION</h1>
        <div id="score-board">时速: <span id="speedo">0</span> km/h | 赛事进度: <span id="dist">0</span> / 40000m</div>
        <div class="tip-text" id="gameTip">⌨️ 按回车键 (Enter) 弹射起步！享受最终极致超跑视听！</div>
    </div>

    <div id="progress-box">
        <div id="p-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai1-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai2-dot" class="dot" style="bottom: 0px;"></div>
    </div>

    <div id="canvas-container">
        <div id="loading-text">🚀 正在注入终极 3D 全景超跑引擎...</div>
    </div>
    
    <a href="../" class="back-btn">← 返回游戏大厅</a>

    <script>
        const TRACK_LENGTH = 40000;
        const container = document.getElementById('canvas-container');
        
        let scene, camera, renderer, use3D = true;
        let playerCar, ai1Car, ai2Car;
        let pDist = 0, pSpeed = 0, pX = 0; 
        let ai1Dist = 10, ai1Speed = 0, ai1X = -8;
        let ai2Dist = 15, ai2Speed = 0, ai2X = 8;
        
        let obstacles = [];
        let roadSegments = [];
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let gameRunning = false;
        let particles = [];

        // 45重魔鬼大弯道几何公式剧本
        function getTrackCurveAt(zPos) {
            let absZ = Math.abs(zPos);
            if (absZ < 1000) return 0;
            // 通过正弦与周期函数，每过800米自动生成一套连续空间大扭曲
            let segment = Math.floor(absZ / 850);
            if (segment > 45) return 0;
            let intensity = 1.2 + (segment * 0.05); // 越往后甩尾越猛
            return Math.sin(absZ * 0.0015) * intensity;
        }

        window.addEventListener('load', function() {
            document.getElementById('loading-text').style.display = 'none';
            if (typeof THREE === 'undefined') { alert("3D库加载失败，请刷新重试！"); return; }
            initUltimate3D();
        });

        function initUltimate3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.004);

            camera = new THREE.PerspectiveCamera(60, 720 / 480, 0.2, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(720, 480);
            renderer.setClearColor(0x020205, 1);
            container.appendChild(renderer.domElement);

            // 高阶环境光
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0x00ffcc, 1.0);
            light.position.set(0, 30, 20);
            scene.add(light);

            // 立体跑道生成（每隔15米一段，动态拼装全线紧密咬合弯道）
            for (let z = 0; z > -1500; z -= 15) {
                createRoadSegment(z);
            }

            // 创建三架极具立体肌肉拉花的赛车
            playerCar = createSuperMachine("#00ffcc", true); scene.add(playerCar);
            ai1Car = createSuperMachine("#ff0055", false); scene.add(ai1Car);
            ai2Car = createSuperMachine("#ffca28", false); scene.add(ai2Car);

            // 初始摄像机锁定
            updateCameraAndPositions();
            renderer.render(scene, camera);
        }

        // 创建无缝咬合的动态空间弯道切片
        function createRoadSegment(zPos) {
            const segGroup = new THREE.Group();
            let curve = getTrackCurveAt(zPos);
            let xOffset = curve * 45; // 核心道路中心点坐标

            // 柏油主路
            const roadGeo = new THREE.PlaneGeometry(44, 16);
            const roadMat = new THREE.MeshStandardMaterial({ color: "#13141f", roughness: 0.6 });
            const roadMesh = new THREE.Mesh(roadGeo, roadMat);
            roadMesh.rotation.x = -Math.PI / 2;
            segGroup.add(roadMesh);

            // 两侧电子发光霓虹路肩边线
            const sideGeo = new THREE.BoxGeometry(1.2, 0.3, 16);
            const sideMatL = new THREE.MeshBasicMaterial({ color: (Math.abs(zPos)/16)%2===0 ? "#00ffcc" : "#111" });
            const sideMatR = new THREE.MeshBasicMaterial({ color: (Math.abs(zPos)/16)%2===0 ? "#ff0055" : "#111" });
            
            const lSide = new THREE.Mesh(sideGeo, sideMatL); lSide.position.set(-22, 0.15, 0); segGroup.add(lSide);
            const rSide = new THREE.Mesh(sideGeo, sideMatR); rSide.position.set(22, 0.15, 0); segGroup.add(rSide);

            // 左右两侧高大霓虹灯柱（100%跟随道路曲线！）
            if (Math.abs(zPos) % 45 === 0) {
                const poleGeo = new THREE.CylinderGeometry(0.2, 0.2, 16, 6);
                const poleMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? "#00ffcc" : "#ff0055" });
                const lp = new THREE.Mesh(poleGeo, poleMat); lp.position.set(-25, 8, 0); segGroup.add(lp);
                const rp = new THREE.Mesh(poleGeo, poleMat); rp.position.set(25, 8, 0); segGroup.add(rp);
            }

            segGroup.position.set(xOffset, 0, zPos);
            scene.add(segGroup);
            roadSegments.push(segGroup);
        }

        // 打造极致立体的超跑机甲模型
        function createSuperMachine(colorHex, isPlayer) {
            const car = new THREE.Group();

            // 超宽大底盘包围
            const base = new THREE.Mesh(new THREE.BoxGeometry(4.0, 0.3, 7.4), new THREE.MeshStandardMaterial({ color: "#08090d" }));
            base.position.y = 0.25; car.add(base);

            // 炫酷肌肉流线前脸罩
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.8, 4.6), new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.1, metalness: 0.4 }));
            body.position.set(0, 0.75, 0.4); car.add(body);

            // F1俯冲切角立体车头
            const nose = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.4, 2.6), body.material);
            nose.position.set(0, 0.5, -2.6); nose.rotation.x = 0.15; car.add(nose);

            // 熏黑水滴全景战斗机驾驶舱
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.7, 3.0), new THREE.MeshStandardMaterial({ color: "#07080c", roughness: 0.05 }));
            cabin.position.set(0, 1.35, 0.2); car.add(cabin);

            // 冰蓝色全LED贯穿大灯
            const light = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.12, 0.2), new THREE.MeshBasicMaterial({ color: "#00ffff" }));
            light.position.set(-1.1, 0.5, -3.8); car.add(light);
            const rLight = light.clone(); rLight.position.x = 1.1; car.add(rLight);

            // 大型炫黑宽体定风翼
            const wing = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.12, 1.2), new THREE.MeshStandardMaterial({ color: "#0a0a0f" }));
            wing.position.set(0, 1.7, 3.4); car.add(wing);
            const supportL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 0.8), wing.material); supportL.position.set(-2.2, 1.2, 3.4); car.add(supportL);
            const supportR = supportL.clone(); supportR.position.x = 2.2; car.add(supportR);

            // 独立运动宽体电镀轮毂
            const wGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.65, 16);
            const wMat = new THREE.MeshStandardMaterial({ color: "#111115", roughness: 0.5 });
            [{x:-2.1, z:-2}, {x:2.1, z:-2}, {x:-2.1, z:2.4}, {x:2.1, z:2.4}].forEach(pos => {
                const wheel = new THREE.Mesh(wGeo, wMat); wheel.rotation.z = Math.PI / 2; wheel.position.set(pos.x, 0.65, pos.z); car.add(wheel);
            });

            return car;
        }

        window.addEventListener("keydown", e => {
            if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
            if(e.key === "Enter" && !gameRunning) { gameRunning = true; document.getElementById("gameTip").innerText = "🏎️ FINAL RUSH! 正在高频迎击发光晶体矩阵！"; animate(); }
            if(e.key in keys) keys[e.key] = true;
        });
        window.addEventListener("keyup", e => { if(e.key in keys) keys[e.key] = false; });

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);

            // 1. 核心操控与极速推背感物理
            if (keys.ArrowUp) { if (pSpeed < 4.6) pSpeed += 0.06; }
            else if (keys.ArrowDown) { if (pSpeed > 0) pSpeed -= 0.15; }
            else { if (pSpeed > 0) pSpeed -= 0.03; }
            if (pSpeed < 0) pSpeed = 0;

            if (pSpeed > 0.1) {
                if (keys.ArrowLeft && pX > -18) pX -= 0.75;
                if (keys.ArrowRight && pX < 18) pX += 0.75;
            }
            pDist += pSpeed;

            // 2. AI 宿敌狂暴提速追踪
            if(ai1Dist < TRACK_LENGTH) { ai1Speed += (4.1 - ai1Speed) * 0.015; ai1Dist += ai1Speed; }
            if(ai2Dist < TRACK_LENGTH) { ai2Speed += (4.2 - ai2Speed) * 0.015; ai2Dist += ai2Speed; }
            
            // 智能超强变道拦截
            if (ai1Dist > pDist && ai1Dist - pDist < 180) ai1X += (pX - ai1X) * 0.025;
            if (ai2Dist > pDist && ai2Dist - pDist < 180) ai2X += (pX - ai2X) * 0.025;
            if(ai1X < -18) ai1X = -18; if(ai1X > 18) ai1X = 18;
            if(ai2X < -18) ai2X = -18; if(ai2X > 18) ai2X = 18;

            // 3. 【重大改进：障碍物大量高频刷新】
            if (Math.random() < 0.04 && obstacles.length < 7) { 
                let spawnZ = -550 - pDist - (Math.random() * 200);
                let spawnCurve = getTrackCurveAt(spawnZ);
                const obsGeo = new THREE.BoxGeometry(3.5, 3.5, 3.5);
                // 亮粉色超级发光路障晶体
                const obsMat = new THREE.MeshStandardMaterial({ color: "#ff007f", emissive: "#440022", roughness: 0.1 });
                const obsMesh = new THREE.Mesh(obsGeo, obsMat);
                obsMesh.position.set(spawnCurve * 45 + (Math.random() * 32 - 16), 1.75, spawnZ);
                scene.add(obsMesh);
                obstacles.push(obsMesh);
            }

            // 4. 动态迭代3D空间无限向前拼接
            roadSegments.forEach(seg => {
                let relZ = seg.position.z - (-pDist);
                if (relZ > 100) {
                    let newZ = seg.position.z - 1500;
                    let c = getTrackCurveAt(newZ);
                    seg.position.set(c * 45, 0, newZ);
                }
            });

            // 5. 毫秒级高精碰撞判定与火花迸发
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let relZ = obs.position.z - (-pDist);
                let pWorldX = playerCar.position.x;
                
                if (relZ > -3.8 && relZ < 3.8 && Math.abs(obs.position.x - pWorldX) < 3.6) {
                    pSpeed = 0.15; // 正面撞停惩罚
                    explodeParticles(pWorldX, 1.5, -pDist); // 炸裂火花
                    camera.position.y += 1.5; // 镜头撞击震动效果
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }
                if (relZ > 30) { scene.remove(obs); obstacles.splice(i, 1); }
            }

            // 6. 草地摩擦阻力惩罚
            let pCurrentCurve = getTrackCurveAt(-pDist) * 45;
            if (pX + pCurrentCurve < pCurrentCurve - 21 || pX + pCurrentCurve > pCurrentCurve + 21) {
                pSpeed = Math.max(1.0, pSpeed - 0.15);
            }

            // 7. 三维等离子尾焰与状态刷新
            if (keys.ArrowUp && pSpeed > 0.5) createEnginePlumes();
            updateParticles();
            updateCameraAndPositions();

            // 刷新面板数值
            document.getElementById("speedo").innerText = Math.floor(pSpeed * 105);
            document.getElementById("dist").innerText = Math.floor(pDist);
            document.getElementById("p-dot").style.bottom = (Math.min(1, pDist/TRACK_LENGTH) * 356) + "px";
            document.getElementById("ai1-dot").style.bottom = (Math.min(1, ai1Dist/TRACK_LENGTH) * 356) + "px";
            document.getElementById("ai2-dot").style.bottom = (Math.min(1, ai2Dist/TRACK_LENGTH) * 356) + "px";

            if (pDist >= TRACK_LENGTH) { gameRunning = false; alert("🏆 VICTORY! 你征服了45重弯道与晶体矩阵，成为终极车神！"); }
            if (ai1Dist >= TRACK_LENGTH || ai2Dist >= TRACK_LENGTH) { gameRunning = false; alert("😭 DEFEAT! 输给了狂暴化的宿敌跑车！"); }

            renderer.render(scene, camera);
        }

        // 【超级进化】镜头直升机死死追随锁定与三维车身倾斜！
        function updateCameraAndPositions() {
            let pCurve = getTrackCurveAt(-pDist) * 45;
            
            // 兰博基尼永远顺畅贴合弯道曲率坐标！
            playerCar.position.set(pCurve + pX, 0, -pDist);
            // 变道与过弯时车身左右倾斜
            playerCar.rotation.y = keys.ArrowLeft ? 0.12 : (keys.ArrowRight ? -0.12 : 0);
            playerCar.rotation.z = (pX * -0.01) - (getTrackCurveAt(-pDist) * 0.05);

            // 对手车轨迹同样绑定弯道曲线
            let ai1Curve = getTrackCurveAt(-ai1Dist) * 45;
            ai1Car.position.set(ai1Curve + ai1X, 0, -ai1Dist);
            ai1Car.rotation.z = -getTrackCurveAt(-ai1Dist) * 0.05;

            let ai2Curve = getTrackCurveAt(-ai2Dist) * 45;
            ai2Car.position.set(ai2Curve + ai2X, 0, -ai2Dist);
            ai2Car.rotation.z = -getTrackCurveAt(-ai2Dist) * 0.05;

            // 极速赛车游戏专属追踪俯瞰视角
            camera.position.x = playerCar.position.x * 0.65 + getTrackCurveAt(-pDist - 40) * 15;
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, 6.0 - (pSpeed * 0.2), 0.1); 
            camera.position.z = -pDist + 13.5; 
            camera.lookAt(playerCar.position.x, 2.0 + (pSpeed * 0.1), -pDist - 15);
        }

        // 亮红、明黄、天蓝交织的立体多色等离子火焰
        function createEnginePlumes() {
            const colors = ["#00ffff", "#ff0055", "#fff200"];
            const pGeo = new THREE.BoxGeometry(0.35, 0.35, 0.35);
            const pMat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
            const p = new THREE.Mesh(pGeo, pMat);
            
            p.position.set(playerCar.position.x + (Math.random()*1.4 - 0.7), 0.6, -pDist + 3.6);
            scene.add(p);
            particles.push({ mesh: p, life: 1.0, vx: Math.random()*0.1-0.05, vz: 1.6 });
        }

        function explodeParticles(x, y, z) {
            for(let i=0; i<18; i++) {
                const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: "#ff3366" }));
                pMesh.position.set(x + (Math.random()*2-1), y, z); scene.add(pMesh);
                particles.push({ mesh: pMesh, life: 1.0, vx: Math.random()*0.8-0.4, vz: Math.random()*0.4 - 0.2 });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.mesh.position.z += p.vz; p.mesh.position.x += p.vx; p.life -= 0.04;
                p.mesh.scale.set(p.life, p.life, p.life);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }
    </script>
</body>
</html>
