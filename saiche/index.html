<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极限拉力赛：弯道狂飙</title>
    <style>
        body {
            background-color: #111424;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { margin: 5px 0; font-size: 26px; color: #f39c12; text-shadow: 0 2px 5px rgba(0,0,0,0.7); }
        
        .game-layout {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* 进度条样式 */
        .progress-container {
            width: 32px;
            height: 460px;
            background: #1e272e;
            border: 3px solid #7f8c8d;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .progress-finish {
            position: absolute;
            top: 0; width: 100%; height: 16px;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                              linear-gradient(45deg, #000 25%, #fff 25%, #fff 75%, #000 75%, #000);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            border-radius: 8px 8px 0 0;
        }
        .player-indicator {
            position: absolute;
            left: 5px; width: 14px; height: 14px;
            background: #3498db; border: 2px solid #fff; border-radius: 50%;
            transition: bottom 0.1s linear;
            z-index: 3;
        }
        .ai-indicator {
            position: absolute;
            left: 7px; width: 10px; height: 10px;
            border: 2px solid #fff; border-radius: 50%;
            transition: bottom 0.1s linear;
        }

        canvas {
            background-color: #2c3e50;
            border: 4px solid #7f8c8d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            outline: none;
        }
        .tip-text {
            margin-top: 12px;
            font-size: 16px;
            color: #f1c40f;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .back-btn { margin-top: 12px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <h1>🏎️ 极限拉力赛：30000米大弯道</h1>
    
    <div class="game-layout">
        <div class="progress-container" id="progressBar">
            <div class="progress-finish"></div>
        </div>

        <canvas id="roadCanvas" width="400" height="480" tabindex="1"></canvas>
    </div>
    
    <div class="tip-text" id="gameTip">⌨️ 按回车键 (Enter) 开启3万米跨年狂飙！</div>
    <a href="../" class="back-btn">← 返回游戏大厅</a>

    <script>
        const canvas = document.getElementById("roadCanvas");
        const ctx = canvas.getContext("2d");
        const tipElement = document.getElementById("gameTip");
        const progressBar = document.getElementById("progressBar");

        // 【修改2】总距离增加10倍（30000米）
        const TRACK_LENGTH = 30000; 

        const carW = 46;
        const carH = 76;

        // 玩家赛车
        let player = {
            x: 177,
            y: 370,
            distance: 0,
            speed: 0,
            maxSpeed: 18,
            acc: 0.25,
            dec: 0.12,
            color: "#3498db"
        };

        // 【修改3】宿敌赛车精简为2辆
        let aiCars = [
            { id: 1, name: "烈焰红魔", x: 70, distance: 0, speed: 0, maxSpeed: 15.5, color: "#e74c3c" },
            { id: 2, name: "剧毒黄蜂", x: 280, distance: 0, speed: 0, maxSpeed: 16.0, color: "#f1c40f" }
        ];

        // 障碍物数组（路中央的故障三角牌）
        let obstacles = [];

        // 【修改1】弯道控制变量
        let trackCurve = 0;       // 当前赛道的弯曲弯度
        let currentCurveIdx = 0;  // 弯道事件索引
        let bgOffset = 0;

        // 预设弯道剧本 [距离, 弯度(正数右弯，负数左弯)]
        const curveScenarios = [
            {dist: 1500, target: 3},    // 缓右弯
            {dist: 4500, target: -4},   // 急左弯
            {dist: 8000, target: 0},    // 直线
            {dist: 11000, target: 5},   // 大右弯
            {dist: 15000, target: -5},  // 大左弯
            {dist: 19000, target: 2},   // 连续弯
            {dist: 22000, target: -3},
            {dist: 26000, target: 6},   // 魔鬼魔掌弯
            {dist: 29000, target: 0}    // 冲刺直道
        ];

        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let gameInterval;
        let gameRunning = false;

        window.addEventListener("keydown", e => {
            if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
            if (e.key === "Enter" && !gameRunning) { resetGame(); return; }
            if (e.code in keys) keys[e.code] = true;
        });

        window.addEventListener("keyup", e => {
            if (e.code in keys) keys[e.code] = false;
        });

        function startGame() {
            gameRunning = true;
            tipElement.innerText = "🏁 [↑键加速] [← →变道] 顺着弯道方向微调方向，小心路中路障！";
            setupProgressIndicators();
            gameInterval = setInterval(gameLoop, 20);
        }

        function gameLoop() {
            handleInput();
            updateTrackAndCurve();
            moveEntities();
            checkCollisions();
            checkRaceStatus();
            drawScene();
            updateProgress();
        }

        function handleInput() {
            if (keys.ArrowUp) {
                if (player.speed < player.maxSpeed) player.speed += player.acc;
            } else if (keys.ArrowDown) {
                if (player.speed > 0) player.speed -= player.acc * 2;
            } else {
                if (player.speed > 0) player.speed -= player.dec;
            }
            if (player.speed < 0) player.speed = 0;

            if (player.speed > 0.5) {
                if (keys.ArrowLeft) player.x -= 4.5;
                if (keys.ArrowRight) player.x += 4.5;
            }
        }

        // 处理动态弯道逻辑
        function updateTrackAndCurve() {
            // 根据剧本实时改变弯曲度
            let scenario = curveScenarios.find(s => player.distance < s.dist);
            let targetCurve = scenario ? scenario.target : 0;
            
            // 让弯道平滑过渡
            trackCurve += (targetCurve - trackCurve) * 0.02;

            // 关键：弯道惯性影响！如果不按方向键，赛车会受速度影响往弯道反方向漂移
            if (player.speed > 1
