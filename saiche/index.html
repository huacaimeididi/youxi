<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D NEON RUSH - 巅峰极速</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 24px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; text-transform: uppercase; letter-spacing: 2px;}
        #score-board { font-size: 18px; margin: 5px 0; color: #fff; font-weight: bold; }
        .tip-text { font-size: 14px; color: #f1c40f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* 侧边 3D 竞技进度条 */
        #progress-box {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 350px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #333;
            border-radius: 10px;
            z-index: 10;
        }
        .dot {
            position: absolute;
            left: 3px; width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid #fff;
            transition: bottom 0.05s linear;
        }
        #p-dot { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; z-index: 5; }
        #ai1-dot { background: #ff0055; }
        #ai2-dot { background: #ffca28; }
        
        #canvas-container {
            width: 600px;
            height: 480px;
            border: 3px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0,255,204,0.2);
            position: relative;
        }
        .back-btn { position: absolute; bottom: 20px; color: #444; text-decoration: none; font-size: 13px; z-index: 10; }
        .back-btn:hover { color: #fff; }
    </style>
    <!-- 引入行业标准的公共 Three.js 3D 引擎库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>🏎️ 3D NEON RUSH: 极速对决</h1>
        <div id="score-board">当前车速: <span id="speedo">0</span> km/h | 距离: <span id="dist">0</span>m</div>
        <div class="tip-text" id="gameTip">⌨️ 按回车键 (Enter) 3D引擎点火起步！</div>
    </div>

    <!-- 竞技进度 -->
    <div id="progress-box">
        <div id="p-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai1-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai2-dot" class="dot" style="bottom: 0px;"></div>
    </div>

    <div id="canvas-container" id="gameWindow"></div>
    
    <a href="../" class="back-btn">← 返回游戏大厅</a>

    <script>
        const TRACK_LENGTH = 40000;
        const container = document.getElementById('canvas-container');
        
        let scene, camera, renderer;
        let playerCar, ai1Car, ai2Car;
        let pDist = 0, pSpeed = 0, pX = 0;
        let ai1Dist = 0, ai1Speed = 0, ai1X = -12;
        let ai2Dist = 0, ai2Speed = 0, ai2X = 12;
        
        let obstacles = [];
        let neonPoles = [];
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let gameRunning = false;
        let particles = [];

        // 初始化 3D 场景
        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.005);

            camera = new THREE.PerspectiveCamera(60, 600 / 480, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(600, 480);
            renderer.setClearColor(0x05050a, 1);
            container.appendChild(renderer.domElement);

            // 光照系统
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0x00ffcc, 0.8);
            dirLight.position.set(0, 20, 10);
            scene.add(dirLight);

            // 赛道地面
            const roadGeo = new THREE.PlaneGeometry(40, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ color: #15161e });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -400;
            scene.add(road);

            // 赛道白边线
            createTrackLine(-20);
            createTrackLine(20);

            // 纯代码拼装3D超跑：兰博基尼 (毒药绿)
            playerCar = create3DSuperCar(0x00ffcc, true);
            scene.add(playerCar);

            // 法拉利
            ai1Car = create3DSuperCar(0xff0055, false);
            scene.add(ai1Car);

            // 帕加尼
            ai2Car = create3DSuperCar(0xffca28, false);
            scene.add(ai2Car);

            // 生成路旁霓虹流光柱
            for(let i=0; i<30; i++) {
                spawnNeonPole(i * -30);
            }

            // 相机初始几何视角
            camera.position.set(0, 7, 15);
            camera.lookAt(0, 3, -10);

            // 渲染单帧初始画面
            renderer.render(scene, camera);
        }

        // 3D 车辆模型拼装函数（纯数学几何，不需要外带资源文件）
        function create3DSuperCar(colorHex, isPlayer) {
            const carGroup = new THREE.Group();

            // 底盘
            const bodyGeo = new THREE.BoxGeometry(3.6, 0.6, 7);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            carGroup.add(body);

            // 尖锐流线型舱盖 (兰博基尼前倾风挡)
            const cabinGeo = new THREE.BoxGeometry(2.8, 0.6, 3.5);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.1 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 1.0, -0.2);
            carGroup.add(cabin);

            // 狂野大型悬浮 3D 尾翼
            const spoilerGeo = new THREE.BoxGeometry(4.4, 0.15, 0.8);
            const spoilerMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
            spoiler.position.set(0, 1.4, 3.2);
            carGroup.add(spoiler);

            const wingLGeo = new THREE.BoxGeometry(0.1, 0.6, 0.8);
            const wingL = new THREE.Mesh(wingLGeo, spoilerMat);
            wingL.position.set(-2.1, 1.1, 3.2);
            carGroup.add(wingL);
            const wingR = wingL.clone();
            wingR.position.x = 2.1;
            carGroup.add(wingR);

            // 四个轮子
            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 12);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            
            const wheels = [
                {x: -1.9, y: 0.5, z: -2}, {x: 1.9, y: 0.5, z: -2},
                {x: -1.9, y: 0.5, z: 2.2}, {x: 1.9, y: 0.5, z: 2.2}
            ];
            wheels.forEach(w => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(w.x, w.y, w.z);
                carGroup.add(wheel);
            });

            return carGroup;
        }

        function createTrackLine(xPos) {
            const lineGeo = new THREE.PlaneGeometry(0.4, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(xPos, 0.01, -400);
            scene.add(line);
        }

        function spawnNeonPole(zPos) {
            const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 12, 6);
            const poleMat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x00ffcc : 0xff0055 });
            
            const leftPole = new THREE.Mesh(poleGeo, poleMat);
            leftPole.position.set(-21, 6, zPos);
            scene.add(leftPole);
            neonPoles.push(leftPole);

            const rightPole = new THREE.Mesh(poleGeo, poleMat);
            rightPole.position.set(21, 6, zPos);
            scene.add(rightPole);
            neonPoles.push(rightPole);
        }

        // 监听按键
        window.addEventListener("keydown", e => {
            if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
            if(e.key === "Enter" && !gameRunning) { resetGame(); }
            if(e.key in keys) keys[e.key] = true;
        });
        window.addEventListener("keyup", e => { if(e.key in keys) keys[e.key] = false; });

        function resetGame() {
            pDist = 0; pSpeed = 0; pX = 0;
            ai1Dist = 10; ai1Speed = 0; ai1X = -10;
            ai2Dist = 15; ai2Speed = 0; ai2X = 10;
            
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];

            document.getElementById("gameTip").innerText = "🏁 极速狂飙中！[← →] 避震拐弯 [↑] 强制提速";
            gameRunning = true;
            animate();
        }

        // 3D 核心游戏循环主引擎
        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);

            // 1. 玩家操控与物理惯性
            if (keys.ArrowUp) { if (pSpeed < 3.2) pSpeed += 0.04; }
            else if (keys.ArrowDown) { if (pSpeed > 0) pSpeed -= 0.08; }
            else { if (pSpeed > 0) pSpeed -= 0.015; }
            if (pSpeed < 0) pSpeed = 0;

            if (pSpeed > 0.1) {
                if (keys.ArrowLeft && pX > -17) pX -= 0.5;
                if (keys.ArrowRight && pX < 17) pX += 0.5;
            }
            pDist += pSpeed;

            // 2. 动态运镜系统（3D体感的精髓）
            camera.position.x = pX * 0.7; // 视角微微平移
            camera.position.y = 7 - (pSpeed * 0.4); // 极速推进时底盘视角降低，增加速度感
            camera.rotation.z = -(pX - playerCar.position.x) * 0.05; // 转向时车身带起镜头倾斜！
            
            playerCar.position.set(pX, 0, 0);
            playerCar.rotation.y = keys.ArrowLeft ? 0.08 : (keys.ArrowRight ? -0.08 : 0);

            // 3. AI 全面加强型起步追击与堵位逻辑
            if(ai1Dist < TRACK_LENGTH) { ai1Speed += (2.85 + Math.random()*0.2 - ai1Speed)*0.02; ai1Dist += ai1Speed; }
            if(ai2Dist < TRACK_LENGTH) { ai2Speed += (2.95 + Math.random()*0.2 - ai2Speed)*0.02; ai2Dist += ai2Speed; }
            
            // 智能蛇形堵位：AI 会在前方故意往你的航道靠拢阻挡
            if (ai1Dist > pDist && ai1Dist - pDist < 120) ai1X += (pX - ai1X) * 0.01;
            if (ai2Dist > pDist && ai2Dist - pDist < 120) ai2X += (pX - ai2X) * 0.01;

            ai1Car.position.set(ai1X, 0, -(ai1Dist - pDist));
            ai2Car.position.set(ai2X, 0, -(ai2Dist - pDist));

            // 4. 循环路灯，保障无尽空间感
            neonPoles.forEach(pole => {
                let relativeZ = (pole.position.z - (-pDist)) % 900;
                if (relativeZ > 0) relativeZ -= 900;
                pole.position.z = relativeZ;
            });

            // 5. 3D 霓虹障碍箱动态生成与检测
            if (Math.random() < 0.008 && obstacles.length < 3) {
                const obsGeo = new THREE.BoxGeometry(3, 3, 3);
                const obsMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x552200 });
                const obsMesh = new THREE.Mesh(obsGeo, obsMat);
                obsMesh.position.set(Math.random() * 30 - 15, 1.5, -500 - pDist);
                scene.add(obsMesh);
                obstacles.push(obsMesh);
            }

            // 移动与碰撞逻辑
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let relZ = obs.position.z - (-pDist);
                
                // 碰撞判定
                if (relZ > -3.5 && relZ < 3.5 && Math.abs(obs.position.x - pX) < 3.2) {
                    pSpeed = 0.2; // 玩家直接撞停
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }
                // AI 压障碍同样公平减速
                if (relZ > -3.5 && relZ < 3.5) {
                    if (Math.abs(obs.position.x - ai1X) < 3) ai1Speed = 0.5;
                    if (Math.abs(obs.position.x - ai2X) < 3) ai2Speed = 0.5;
                }

                if (relZ > 20) { scene.remove(obs); obstacles.splice(i, 1); }
            }

            // 6. 3D 粒子氮气喷火
            if (keys.ArrowUp && pSpeed > 1) createJetFlame();
            updateParticles();

            // 更新仪表盘与指示条
            document.getElementById("speedo").innerText = Math.floor(pSpeed * 110);
            document.getElementById("dist").innerText = Math.floor(pDist);
            
            document.getElementById("p-dot").style.bottom = (Math.min(1, pDist/TRACK_LENGTH) * 336) + "px";
            document.getElementById("ai1-dot").style.bottom = (Math.min(1, ai1Dist/TRACK_LENGTH) * 336) + "px";
            document.getElementById("ai2-dot").style.bottom = (Math.min(1, ai2Dist/TRACK_LENGTH) * 336) + "px";

            // 判定胜利
            if (pDist >= TRACK_LENGTH) { gameRunning = false; alert("🎉 逆天改命！你的 3D 兰博基尼拿下了最终胜利！"); }
            if (ai1Dist >= TRACK_LENGTH || ai2Dist >= TRACK_LENGTH) { gameRunning = false; alert("😭 宿敌率先冲线，下次再来吧！"); }

            renderer.render(scene, camera);
        }

        // 3D 氮气蓝色粒子池
        function createJetFlame() {
            const pGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const pMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.set(pX + (Math.random()*1.2 - 0.6), 0.5, 3.5);
            scene.add(p);
            particles.push({ mesh: p, life: 1.0, vx: Math.random()*0.1-0.05, vz: 1.5 });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.mesh.position.z += p.vz;
                p.mesh.position.x += p.vx;
                p.life -= 0.05;
                p.mesh.scale.set(p.life, p.life, p.life);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        // 启动场景
        init3D();
    </script>
</body>
</html>
