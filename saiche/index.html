<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D NEON RUSH - 巅峰极速</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 24px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; text-transform: uppercase; letter-spacing: 2px;}
        #score-board { font-size: 18px; margin: 5px 0; color: #fff; font-weight: bold; }
        .tip-text { font-size: 14px; color: #f1c40f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        #progress-box {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 350px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #333;
            border-radius: 10px;
            z-index: 10;
        }
        .dot {
            position: absolute;
            left: 3px; width: 14px; height: 14px;
            border-radius: 50%; border: 2px solid #fff;
            transition: bottom 0.05s linear;
        }
        #p-dot { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; z-index: 5; }
        #ai1-dot { background: #ff0055; }
        #ai2-dot { background: #ffca28; }
        
        #canvas-container {
            width: 600px;
            height: 480px;
            border: 3px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0,255,204,0.2);
            position: relative;
            background: #000;
        }
        .back-btn { position: absolute; bottom: 20px; color: #444; text-decoration: none; font-size: 13px; z-index: 10; }
        .back-btn:hover { color: #fff; }
        #error-log { position: absolute; bottom: 10px; color: #ff4757; font-size: 14px; width: 90%; text-align: center; font-weight: bold; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>🏎️ 3D NEON RUSH: 极速对决</h1>
        <div id="score-board">当前车速: <span id="speedo">0</span> km/h | 距离: <span id="dist">0</span>m</div>
        <div class="tip-text" id="gameTip">⌨️ 按回车键 (Enter) 3D引擎点火起步！</div>
    </div>

    <div id="progress-box">
        <div id="p-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai1-dot" class="dot" style="bottom: 0px;"></div>
        <div id="ai2-dot" class="dot" style="bottom: 0px;"></div>
    </div>

    <div id="canvas-container">
        <div id="error-log">3D引擎静默加载中...</div>
    </div>
    
    <a href="../" class="back-btn">← 返回游戏大厅</a>

    <script>
        // 全局错误实时捕获
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').innerText = "🚨 错误阻断: " + msg + " (第" + line + "行)";
        };

        const TRACK_LENGTH = 40000;
        const container = document.getElementById('canvas-container');
        
        let scene, camera, renderer;
        let playerCar, ai1Car, ai2Car;
        let pDist = 0, pSpeed = 0, pX = 0;
        let ai1Dist = 10, ai1Speed = 0, ai1X = -12;
        let ai2Dist = 15, ai2Speed = 0, ai2X = 12;
        
        let obstacles = [];
        let neonPoles = [];
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let gameRunning = false;
        let particles = [];

        function init3D() {
            // 清除加载文字
            document.getElementById('error-log').innerText = "";

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.005);

            camera = new THREE.PerspectiveCamera(60, 600 / 480, 0.1, 1000);
            camera.position.set(0, 7, 15);
            camera.lookAt(0, 3, -10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(600, 480);
            renderer.setClearColor(0x05050a, 1);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0x00ffcc, 0.8);
            dirLight.position.set(0, 20, 10);
            scene.add(dirLight);

            const roadGeo = new THREE.PlaneGeometry(40, 2000);
            const roadMat = new THREE.MeshStandardMaterial({ color: "#15161e", roughness: 0.4 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -800;
            scene.add(road);

            createTrackLine(-20);
            createTrackLine(20);

            playerCar = create3DSuperCar("#00ffcc");
            scene.add(playerCar);

            ai1Car = create3DSuperCar("#ff0055");
            scene.add(ai1Car);
            ai1Car.position.set(ai1X, 0, -10);

            ai2Car = create3DSuperCar("#ffca28");
            scene.add(ai2Car);
            ai2Car.position.set(ai2X, 0, -15);

            for(let i = 0; i < 40; i++) {
                spawnNeonPole(i * -25);
            }

            renderer.render(scene, camera);
        }

        function create3DSuperCar(colorHex) {
            const carGroup = new THREE.Group();

            const bodyGeo = new THREE.BoxGeometry(3.6, 0.6, 7);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.5;
            carGroup.add(body);

            const cabinGeo = new THREE.BoxGeometry(2.8, 0.6, 3.5);
            const cabinMat = new THREE.MeshStandardMaterial({ color: "#111115", roughness: 0.1 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 1.0, -0.2);
            carGroup.add(cabin);

            const spoilerGeo = new THREE.BoxGeometry(4.4, 0.15, 0.8);
            const spoilerMat = new THREE.MeshStandardMaterial({ color: "#111111" });
            const spoiler = new THREE.Mesh(spoilerGeo, spoilerMat);
            spoiler.position.set(0, 1.4, 3.2);
            carGroup.add(spoiler);

            const wingLGeo = new THREE.BoxGeometry(0.1, 0.6, 0.8);
            const wingL = new THREE.Mesh(wingLGeo, spoilerMat);
            wingL.position.set(-2.1, 1.1, 3.2);
            carGroup.add(wingL);
            const wingR = wingL.clone();
            wingR.position.x = 2.1;
            carGroup.add(wingR);

            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 12);
            const wheelMat = new THREE.MeshStandardMaterial({ color: "#222222", roughness: 0.8 });
            const wheels = [
                {x: -1.9, y: 0.5, z: -2}, {x: 1.9, y: 0.5, z: -2},
                {x: -1.9, y: 0.5, z: 2.2}, {x: 1.9, y: 0.5, z: 2.2}
            ];
            wheels.forEach(w => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(w.x, w.y, w.z);
                carGroup.add(wheel);
            });

            return carGroup;
        }

        function createTrackLine(xPos) {
            const lineGeo = new THREE.PlaneGeometry(0.4, 2000);
            const lineMat = new THREE.MeshBasicMaterial({ color: "#ffffff" });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(xPos, 0.02, -800);
            scene.add(line);
        }

        function spawnNeonPole(zPos) {
            const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 12, 6);
            const poleColor = Math.random() > 0.5 ? "#00ffcc" : "#ff0055";
            const poleMat = new THREE.MeshBasicMaterial({ color: poleColor });
            
            const leftPole = new THREE.Mesh(poleGeo, poleMat);
            leftPole.position.set(-22, 6, zPos);
            scene.add(leftPole);
            neonPoles.push(leftPole);

            const rightPole = new THREE.Mesh(poleGeo, poleMat);
            rightPole.position.set(22, 6, zPos);
            scene.add(rightPole);
            neonPoles.push(rightPole);
        }

        window.addEventListener("keydown", e => {
            if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
            if(e.key === "Enter" && !gameRunning) { resetGame(); }
            if(e.key in keys) keys[e.key] = true;
        });
        window.addEventListener("keyup", e => { if(e.key in keys) keys[e.key] = false; });

        function resetGame() {
            pDist = 0; pSpeed = 0; pX = 0;
            ai1Dist = 10; ai1Speed = 0; ai1X = -12;
            ai2Dist = 15; ai2Speed = 0; ai2X = 12;
            
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];

            document.getElementById("gameTip").innerText = "🏁 极速飙车中！[← →] 控制车身左右变道";
            gameRunning = true;
            animate();
        }

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);

            if (keys.ArrowUp) { if (pSpeed < 3.5) pSpeed += 0.05; }
            else if (keys.ArrowDown) { if (pSpeed > 0) pSpeed -= 0.1; }
            else { if (pSpeed > 0) pSpeed -= 0.02; }
            if (pSpeed < 0) pSpeed = 0;

            if (pSpeed > 0.1) {
                if (keys.ArrowLeft && pX > -17) pX -= 0.6;
                if (keys.ArrowRight && pX < 17) pX += 0.6;
            }
            pDist += pSpeed;

            camera.position.x = pX * 0.6;
            camera.position.y = 7 - (pSpeed * 0.3);
            camera.rotation.z = -(pX - playerCar.position.x) * 0.03;
            
            playerCar.position.set(pX, 0, 0);

            if(ai1Dist < TRACK_LENGTH) { ai1Speed += (3.1 - ai1Speed) * 0.01; ai1Dist += ai1Speed; }
            if(ai2Dist < TRACK_LENGTH) { ai2Speed += (3.2 - ai2Speed) * 0.01; ai2Dist += ai2Speed; }
            
            if (ai1Dist > pDist && ai1Dist - pDist < 150) ai1X += (pX - ai1X) * 0.015;
            if (ai2Dist > pDist && ai2Dist - pDist < 150) ai2X += (pX - ai2X) * 0.015;

            ai1Car.position.set(ai1X, 0, -(ai1Dist - pDist));
            ai2Car.position.set(ai2X, 0, -(ai2Dist - pDist));

            neonPoles.forEach(pole => {
                let relativeZ = (pole.position.z - (-pDist)) % 800;
                if (relativeZ > 0) relativeZ -= 800;
                pole.position.z = relativeZ;
            });

            if (Math.random() < 0.01 && obstacles.length < 3) {
                const obsGeo = new THREE.BoxGeometry(3, 3, 3);
                const obsMat = new THREE.MeshStandardMaterial({ color: "#ff9f43", emissive: "#331100" });
                const obsMesh = new THREE.Mesh(obsGeo, obsMat);
                obsMesh.position.set(Math.random() * 32 - 16, 1.5, -600 - pDist);
                scene.add(obsMesh);
                obstacles.push(obsMesh);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let relZ = obs.position.z - (-pDist);
                
                if (relZ > -3.5 && relZ < 3.5 && Math.abs(obs.position.x - pX) < 3.4) {
                    pSpeed = 0.2; 
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }
                if (relZ > 20) { scene.remove(obs); obstacles.splice(i, 1); }
            }

            if (keys.ArrowUp && pSpeed > 1) createJetFlame();
            updateParticles();

            document.getElementById("speedo").innerText = Math.floor(pSpeed * 110);
            document.getElementById("dist").innerText = Math.floor(pDist);
            
            document.getElementById("p-dot").style.bottom = (Math.min(1, pDist/TRACK_LENGTH) * 336) + "px";
            document.getElementById("ai1-dot").style.bottom = (Math.min(1, ai1Dist/TRACK_LENGTH) * 336) + "px";
            document.getElementById("ai2-dot").style.bottom = (Math.min(1, ai2Dist/TRACK_LENGTH) * 336) + "px";

            if (pDist >= TRACK_LENGTH) { gameRunning = false; alert("🎉 胜利！"); }
            if (ai1Dist >= TRACK_LENGTH || ai2Dist >= TRACK_LENGTH) { gameRunning = false; alert("😭 失败！"); }

            renderer.render(scene, camera);
        }

        function createJetFlame() {
            const pGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const pMat = new THREE.MeshBasicMaterial({ color: "#00ffff" });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.set(pX + (Math.random()*1.2 - 0.6), 0.5, 3.5);
            scene.add(p);
            particles.push({ mesh: p, life: 1.0, vx: Math.random()*0.1-0.05, vz: 1.6 });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.mesh.position.z += p.vz;
                p.mesh.position.x += p.vx;
                p.life -= 0.06;
                p.mesh.scale.set(p.life, p.life, p.life);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }
        }

        // 确保在线引入库完成后再启动
        window.onload = function() {
            if (typeof THREE === 'undefined') {
                document.getElementById('error-log').innerText = "🚨 引擎下载被拦截！请关闭浏览器去广告插件（如AdBlock），或更换其他浏览器打开。";
            } else {
                try {
                    init3D();
                } catch(e) {
                    document.getElementById('error-log').innerText = "🚨 3D初始化报错: " + e.message;
                }
            }
        };
    </script>
</body>
</html>
