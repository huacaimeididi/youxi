<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>歼-20 空战王者 - 3D战斗机射击游戏</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- 开始界面 -->
        <div id="start-screen" class="screen active">
            <div class="title-container">
                <h1 class="game-title">歼-20 空战王者</h1>
                <p class="subtitle">3D战斗机射击游戏</p>
                <div class="title-decoration">✈ ✈ ✈</div>
            </div>

            <div class="fighter-selection">
                <h2>选择你的战机</h2>
                <div class="fighters-grid">
                    <div class="fighter-card selected" data-fighter="china" data-name="歼-20" data-country="中国">
                        <div class="fighter-icon">🇨🇳</div>
                        <div class="fighter-name">歼-20</div>
                        <div class="fighter-country">中国</div>
                        <div class="fighter-stats">
                            <div class="stat"><span>速度</span><div class="bar"><div style="width:90%"></div></div></div>
                            <div class="stat"><span>火力</span><div class="bar"><div style="width:85%"></div></div></div>
                            <div class="stat"><span>机动</span><div class="bar"><div style="width:95%"></div></div></div>
                        </div>
                    </div>
                    <div class="fighter-card" data-fighter="usa" data-name="F-22" data-country="美国">
                        <div class="fighter-icon">🇺🇸</div>
                        <div class="fighter-name">F-22 猛禽</div>
                        <div class="fighter-country">美国</div>
                        <div class="fighter-stats">
                            <div class="stat"><span>速度</span><div class="bar"><div style="width:88%"></div></div></div>
                            <div class="stat"><span>火力</span><div class="bar"><div style="width:90%"></div></div></div>
                            <div class="stat"><span>机动</span><div class="bar"><div style="width:85%"></div></div></div>
                        </div>
                    </div>
                    <div class="fighter-card" data-fighter="japan" data-name="F-2" data-country="日本">
                        <div class="fighter-icon">🇯🇵</div>
                        <div class="fighter-name">F-2 支援战斗机</div>
                        <div class="fighter-country">日本</div>
                        <div class="fighter-stats">
                            <div class="stat"><span>速度</span><div class="bar"><div style="width:75%"></div></div></div>
                            <div class="stat"><span>火力</span><div class="bar"><div style="width:80%"></div></div></div>
                            <div class="stat"><span>机动</span><div class="bar"><div style="width:78%"></div></div></div>
                        </div>
                    </div>
                    <div class="fighter-card" data-fighter="france" data-name="阵风" data-country="法国">
                        <div class="fighter-icon">🇫🇷</div>
                        <div class="fighter-name">阵风 Rafale</div>
                        <div class="fighter-country">法国</div>
                        <div class="fighter-stats">
                            <div class="stat"><span>速度</span><div class="bar"><div style="width:82%"></div></div></div>
                            <div class="stat"><span>火力</span><div class="bar"><div style="width:85%"></div></div></div>
                            <div class="stat"><span>机动</span><div class="bar"><div style="width:88%"></div></div></div>
                        </div>
                    </div>
                    <div class="fighter-card" data-fighter="russia" data-name="苏-57" data-country="俄罗斯">
                        <div class="fighter-icon">🇷🇺</div>
                        <div class="fighter-name">苏-57</div>
                        <div class="fighter-country">俄罗斯</div>
                        <div class="fighter-stats">
                            <div class="stat"><span>速度</span><div class="bar"><div style="width:92%"></div></div></div>
                            <div class="stat"><span>火力</span><div class="bar"><div style="width:88%"></div></div></div>
                            <div class="stat"><span>机动</span><div class="bar"><div style="width:90%"></div></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-info">
                <div class="control-group">
                    <div class="key">↑↓←→</div>
                    <span>控制方向</span>
                </div>
                <div class="control-group">
                    <div class="key">空格</div>
                    <span>射击</span>
                </div>
                <div class="control-group mobile">
                    <div class="key">触摸</div>
                    <span>滑动控制</span>
                </div>
            </div>

            <button id="start-btn" class="btn-primary">开始战斗</button>
            <p class="version">五局三胜制 | 跨平台支持</p>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <div id="hud">
                <div class="hud-top">
                    <div class="score-board">
                        <div class="player-score">
                            <span class="label">我方</span>
                            <span class="score" id="player-score">0</span>
                        </div>
                        <div class="round-info">
                            <span id="round-display">第 1 局</span>
                            <span id="match-score">0 - 0</span>
                        </div>
                        <div class="enemy-score">
                            <span class="score" id="enemy-score">0</span>
                            <span class="label">敌方</span>
                        </div>
                    </div>
                </div>

                <div class="hud-bottom">
                    <div class="health-bar">
                        <div class="bar-container">
                            <div class="bar-fill" id="player-health"></div>
                        </div>
                        <span class="health-label">装甲</span>
                    </div>
                    <div class="weapon-info">
                        <span id="ammo-count">∞</span>
                        <span class="weapon-label">机炮</span>
                    </div>
                </div>
            </div>

            <div id="touch-controls" class="mobile-only">
                <div id="joystick-area" class="joystick-area">
                    <div id="joystick-knob" class="joystick-knob"></div>
                </div>
                <div id="fire-btn" class="fire-btn">🔥</div>
            </div>

            <div id="message-area"></div>
        </div>

        <!-- 回合结束界面 -->
        <div id="round-screen" class="screen">
            <div class="round-result">
                <h2 id="round-result-title">回合结束</h2>
                <p id="round-result-text"></p>
                <div class="round-stats">
                    <div class="stat-item">
                        <span class="stat-label">击中次数</span>
                        <span class="stat-value" id="stat-hits">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">命中率</span>
                        <span class="stat-value" id="stat-accuracy">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">剩余生命</span>
                        <span class="stat-value" id="stat-health">100%</span>
                    </div>
                </div>
                <button id="next-round-btn" class="btn-primary">下一局</button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameover-screen" class="screen">
            <div class="gameover-result">
                <h2 id="gameover-title">战斗结束</h2>
                <div class="final-score">
                    <div class="final-player">
                        <span class="final-label">我方</span>
                        <span class="final-score-num" id="final-player-score">0</span>
                    </div>
                    <div class="final-vs">VS</div>
                    <div class="final-enemy">
                        <span class="final-score-num" id="final-enemy-score">0</span>
                        <span class="final-label">敌方</span>
                    </div>
                </div>
                <p id="gameover-message"></p>
                <button id="restart-btn" class="btn-primary">再来一局</button>
                <button id="menu-btn" class="btn-secondary">返回主菜单</button>
            </div>
        </div>

        <!-- 加载界面 -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <div class="spinner"></div>
                <p>加载战机模型...</p>
                <div class="loading-progress">
                    <div class="progress-bar" id="loading-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/fighter-models.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/ai-controller.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
