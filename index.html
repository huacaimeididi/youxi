<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪吃蛇小游戏</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
        }

        #score-board {
            font-size: 20px;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 90vw;
            max-height: 90vw;
            outline: none; /* 去掉聚焦时的外边框 */
        }

        /* 手机端虚拟摇杆样式 */
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
        }

        .btn-ctrl {
            background-color: #34495e;
            color: white;
            border: 2px solid #ecf0f1;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-ctrl:active {
            background-color: #2ecc71;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .btn-reset {
            margin-top: 15px;
            padding: 8px 20px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>贪吃蛇小游戏</h1>
    <div id="score-board">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400" tabindex="1"></canvas>

    <div class="controls">
        <div class="btn-ctrl" id="btn-up" onclick="handleControl('UP')">↑</div>
        <div class="btn-ctrl" id="btn-left" onclick="handleControl('LEFT')">←</div>
        <div class="btn-ctrl" id="btn-right" onclick="handleControl('RIGHT')">→</div>
        <div class="btn-ctrl" id="btn-down" onclick="handleControl('DOWN')">↓</div>
    </div>

    <button class="btn-reset" onclick="resetGame()">重新开始</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 300; // 【修改1】速度减慢一半（从150ms调到300ms）

        // 监听整个窗口的键盘事件
        window.addEventListener("keydown", changeDirection);

        function startGame() {
            gameInterval = setInterval(update, gameSpeed);
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || collisionCheck(head)) {
                clearInterval(gameInterval);
                alert(`游戏结束！您的最终得分是: ${score}`);
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#34495e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.forEach((part, index) => {
                if(index === 0) ctx.fillStyle = "#27ae60";
                else ctx.fillStyle = "#2ecc71";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // 电脑键盘控制逻辑（阻止了方向键滚屏默认行为）
        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // 阻止方向键让网页上下滚动的默认行为
            if([37, 38, 39, 40].includes(keyPressed)) {
                event.preventDefault();
            }

            if (keyPressed === 37 && dx === 0) { dx = -1; dy = 0; } // 左
            if (keyPressed === 38 && dy === 0) { dx = 0; dy = -1; } // 上
            if (keyPressed === 39 && dx === 0) { dx = 1; dy = 0; }  // 右
            if (keyPressed === 40 && dy === 0) { dx = 0; dy = 1; }  // 下
        }

        // 手机点击控制逻辑
        function handleControl(dir) {
            if (dir === 'LEFT' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'RIGHT' && dx === 0) { dx = 1; dy = 0; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 1; }
        }

        function collisionCheck(head) {
            return snake.some((part, index) => index !== 0 && part.x === head.x && part.y === head.y);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            if (snake.some(part => part.x === food.x && part.y === food.y)) {
                generateFood();
            }
        }

        function resetGame() {
            clearInterval(gameInterval);
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            generateFood();
            startGame();
            // 重新开始时也自动聚焦
            canvas.focus();
        }

        // 【修改2】初始化时让窗口和画布自动获取焦点，无需手动点击网页
        window.onload = function() {
            window.focus();
            canvas.focus();
            generateFood();
            startGame();
        };
    </script>
</body>
</html>
