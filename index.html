<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人游戏厅</title>
    <style>
        body {
            background-color: #1a252f;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        p {
            color: #bdc3c7;
            margin-bottom: 40px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card {
            background-color: #2c3e50;
            border: 3px solid #34495e;
            border-radius: 15px;
            width: 240px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s, border-color 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #2ecc71;
        }

        .game-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 14px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h1>🎮 我的个人微型游戏厅</h1>
    <p>点击下方卡片选择你想玩的网页游戏：</p>

    <div class="game-container">
        <a href="./tanchishe/" class="game-card">
            <div class="game-icon">🐍</div>
            <div class="game-title">经典贪吃蛇</div>
            <div class="game-desc">龟速复古模式。键盘回车开始，方向键控制。</div>
        </a>

        <a href="./saiche/" class="game-card">
            <div class="game-icon">🏎️</div>
            <div class="game-title">疯狂赛车</div>
            <div class="game-desc">躲避前方障碍车辆。回车键开始，左右方向键闪避！</div>
        </a>
    </div>

</body>
</html>
