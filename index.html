<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪吃蛇小游戏</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 24px;
        }

        #score-board {
            font-size: 20px;
            margin-bottom: 10px;
        }

        canvas {
            background-color: #34495e;
            border: 4px solid #ecf0f1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 90vw;
            max-height: 90vw;
            outline: none;
        }

        /* 手机端虚拟摇杆样式 */
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
        }

        .btn-ctrl {
            background-color: #34495e;
            color: white;
            border: 2px solid #ecf0f1;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-ctrl:active {
            background-color: #2ecc71;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .tip-text {
            margin-top: 15px;
            font-size: 16px;
            color: #f1c40f;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="score-board">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400" tabindex="1"></canvas>

    <div class="tip-text" id="gameTip">⌨️ 按回车键 (Enter) 开始游戏</div>

    <div class="controls">
        <div class="btn-ctrl" id="btn-up" onclick="handleControl('UP')">↑</div>
        <div class="btn-ctrl" id="btn-left" onclick="handleControl('LEFT')">←</div>
        <div class="btn-ctrl" id="btn-right" onclick="handleControl('RIGHT')">→</div>
        <div class="btn-ctrl" id="btn-down" onclick="handleControl('DOWN')">↓</div>
    </div>
